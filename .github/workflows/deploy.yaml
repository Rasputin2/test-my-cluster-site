name: CI/CD

on:
  push:
    branches: [main]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  deploy:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Login to GHCR
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

      - name: Build backend
        run: docker build -t ghcr.io/${{ github.repository_owner }}/backend:latest ./src/backend

      - name: Build frontend
        run: docker build -t ghcr.io/${{ github.repository_owner }}/frontend:latest ./src/frontend

      - name: Push images
        run: |
          docker push ghcr.io/$rasputin2/backend:latest
          docker push ghcr.io/$rasputin2/frontend:latest

      - name: Set kubeconfig
        run: |
          mkdir -p ~/.kube
          echo "${{ secrets.KUBECONFIG }}" | base64 -d > ~/.kube/config

      - name: Deploy
        run: kubectl apply -f k8s/