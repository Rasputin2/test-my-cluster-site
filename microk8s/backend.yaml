apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
  namespace: test-my-cluster-site
spec:
  replicas: 1
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      labels:
        app: backend
    spec:
      imagePullSecrets:       
        - name: ghcr-secret   
      containers:
        - name: backend
          image: ghcr.io/rasputin2/backend:INITIAL_SHA
          imagePullPolicy: Always
          ports:
            - containerPort: 8000
          env:
            - name: BACKEND_URL
              value: "http://backend-service:8000"
---
apiVersion: v1
kind: Service
metadata:
  name: backend-service
  namespace: test-my-cluster-site
spec:
  selector:
    app: backend
  ports:
    - port: 8000
      targetPort: 8000
