apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: test-my-cluster-site
  namespace: argocd

spec:
  project: default

  source:
    repoURL: https://github.com/rasputin2/test-my-cluster-site.git
    targetRevision: main
    path: .

  destination:
    server: https://kubernetes.default.svc
    namespace: default

  syncPolicy:
    automated:
      prune: true
      selfHeal: true